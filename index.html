---
layout: default
title: Home
---

<section class="hero">
    <img src="/images/profile.jpg">
    <h1>Hi, I'm Ahmad Talib</h1>
    <p>🚀 Computer Engineering Student | Developer | Blogger</p>
    <a href="#blog" class="btn">Explore Blog</a>
</section>

<section id="blog">
    <h2 style="text-align:center;">🔥 Latest Posts</h2>

    <div class="grid">
    {% for post in site.posts %}
        <div class="card">
            <h3><a href="{{ post.url }}">{{ post.title }}</a></h3>
            <small>{{ post.date | date: "%b %d, %Y" }}</small>
            <p>{{ post.excerpt }}</p>
        </div>
    {% endfor %}
    </div>
</section>
